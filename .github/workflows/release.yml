name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # Required to exchange the workflow's OIDC identity for a short-lived
      # crates.io publish token (Trusted Publishing).
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check tag matches crate version
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $version"
            exit 1
          fi

      # Tags can point at commits that never went through PR CI; run the
      # full gates before publishing, since a publish cannot be undone.
      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Check generated code is in sync
        run: |
          cargo run --bin stayputnik-codegen -- generate
          git add --intent-to-add src/services
          git diff --exit-code src/services

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
