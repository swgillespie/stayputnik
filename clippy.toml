# ClientRef contains a Mutex, so clippy::mutable_key_type flags any map/set
# keyed by a generated class handle. Handle Eq/Hash only use the remote object
# id, never the client, so the lint is a false positive for these types.
ignore-interior-mutability = ["stayputnik::client::ClientRef"]

# Generated signatures mirror the kRPC schema, which has procedures returning
# e.g. pairs of vectors (`((f64, f64, f64), (f64, f64, f64))`). Aliasing them
# per-procedure would hurt readability more than the inline tuples do.
type-complexity-threshold = 500
